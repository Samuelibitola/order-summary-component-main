<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="./style.css">
  
  <title>Frontend Mentor | Order summary card</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>

 
</head>
<body>
   
  
  <div class="container">

<div>
<img class="hero-image" src="./images/illustration-hero.svg" alt="a picture of a person with headphones and his phone with musical notes around him">
</div>
  <div class="card-content">
  <div class="order-summary">
 <h2>Order Summary</h2> 
</div>

 <div> 
<p  class="description">You can now listen to millions of songs, audiobooks, and podcasts on any device anywhere you like!</p> 
</div> 

<div  class="plan">
  <img src="./images/icon-music.svg" alt="Music icon" class="plan-img"> 
  <div class="plan-details">
<h3>Annual Plan</h3>
 <p>$59.99/year</p>
 </div>
 <a class="change-link" href="#">Change</a>
 </div> 

<div> 
<button class="proceed-button">Proceed to payment</button>
</div> 

<div>
<button class="cancel-button">Cancel Order</button>
</div>
  
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Samuel Ibitola</a>.
  </footer>
  </div>
  </div>
</body>

</html>
